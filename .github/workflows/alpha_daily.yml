name: Alpha Daily Investment Report

on:
  schedule:
    - cron: '0 21 * * 1-5' # 미국장 마감 후 한국 시간 오전 6시 (21:00 UTC, 백업용 - 주 트리거는 Google Apps Script)
  workflow_dispatch: # 수동 실행 가능

jobs:
  run-alpha:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_SECRET_KEY: ${{ secrets.KIS_SECRET_KEY }}
      KIS_CANO: ${{ secrets.KIS_CANO }}
      KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
      KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      WORKER_URL: ${{ secrets.WORKER_URL }}
      WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Alpha Scanner (100% 될 때까지 재시도)
      id: scanner
      env:
        PYTHONUNBUFFERED: "1"
      run: |
        MAX_RETRIES=3
        RETRY=0
        SCAN_SUCCESS=false
        while [ $RETRY -lt $MAX_RETRIES ]; do
          echo "🔄 스캔 시도 $((RETRY+1))/$MAX_RETRIES"
          python .agent/tools/alpha_scanner.py
          
          # metadata.json에서 success_all 확인
          SUCCESS=$(python -c "import json; m=json.load(open('output_reports/metadata.json')); print(m.get('success_all', False))")
          
          if [ "$SUCCESS" = "True" ]; then
            echo "✅ 100% 수집 완료!"
            SCAN_SUCCESS=true
            break
          fi
          
          RETRY=$((RETRY+1))
          if [ $RETRY -lt $MAX_RETRIES ]; then
            echo "⚠️ 누락 발생. 5분 후 재시도..."
            sleep 300
          fi
        done
        echo "scan_success=$SCAN_SUCCESS" >> $GITHUB_OUTPUT

    - name: Notify scan failure
      if: steps.scanner.outputs.scan_success != 'true'
      run: python .agent/tools/alpha_notify_failure.py

    - name: Run Alpha Sentiment
      if: steps.scanner.outputs.scan_success == 'true'
      run: python .agent/tools/alpha_sentiment.py

    - name: Run Alpha Rebalancer
      if: steps.scanner.outputs.scan_success == 'true'
      run: python .agent/tools/alpha_rebalancer.py

    - name: Run Alpha Messenger
      if: steps.scanner.outputs.scan_success == 'true'
      run: python .agent/tools/alpha_messenger.py

    - name: Save results to repo
      if: steps.scanner.outputs.scan_success == 'true'
      run: |
        git config user.name "Alpha Bot"
        git config user.email "alpha-bot@users.noreply.github.com"
        git add output_reports/ -f
        git diff --cached --quiet || git commit -m "📊 scan $(date -u +%Y-%m-%d)"
        git push || (git pull --rebase && git push)
