name: Alpha Daily Investment Report

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 오전 9시 (00:00 UTC)
  workflow_dispatch: # 수동 실행 가능

jobs:
  run-alpha:
    runs-on: ubuntu-latest
    
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_SECRET_KEY: ${{ secrets.KIS_SECRET_KEY }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Alpha Scanner
      run: python .agent/tools/alpha_scanner.py

    - name: Run Alpha Sentiment
      run: python .agent/tools/alpha_sentiment.py

    - name: Run Alpha Messenger
      run: python .agent/tools/alpha_messenger.py
