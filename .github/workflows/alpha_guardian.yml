name: Alpha Guardian - Portfolio Monitor & Stop-Loss

on:
  # 미국 장중 30분 간격으로 실행 (KST 23:30 ~ 06:00 = UTC 14:30 ~ 21:00)
  schedule:
    - cron: '30 14 * * 1-5'  # 23:30 KST (월~금)
    - cron: '0 15 * * 1-5'   # 00:00 KST
    - cron: '30 15 * * 1-5'  # 00:30 KST
    - cron: '0 16 * * 1-5'   # 01:00 KST
    - cron: '30 16 * * 1-5'  # 01:30 KST
    - cron: '0 17 * * 1-5'   # 02:00 KST
    - cron: '30 17 * * 1-5'  # 02:30 KST
    - cron: '0 18 * * 1-5'   # 03:00 KST
    - cron: '30 18 * * 1-5'  # 03:30 KST
    - cron: '0 19 * * 1-5'   # 04:00 KST
    - cron: '30 19 * * 1-5'  # 04:30 KST
    - cron: '0 20 * * 1-5'   # 05:00 KST
    - cron: '30 20 * * 1-5'  # 05:30 KST
    - cron: '0 21 * * 1-5'   # 06:00 KST
  workflow_dispatch:

jobs:
  guardian:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_SECRET_KEY: ${{ secrets.KIS_SECRET_KEY }}
      KIS_CANO: ${{ secrets.KIS_CANO }}
      KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
      KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Guardian Monitor
      run: python .agent/tools/alpha_guardian.py
