name: Alpha Executor - Approval Check & Auto Buy

# ⚠️ 비활성화됨: 매수/매도는 Cloudflare Worker에서 처리
# GHA에서 KIS 직접 호출 시 해외 IP 차단으로 실패함
# "승인" → 텔레그램 → Worker → KIS (정상 경로)
on:
  # schedule 제거 (Worker에서 처리)
  workflow_dispatch:  # 수동 실행만 허용 (테스트용)

jobs:
  check-and-execute:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_SECRET_KEY: ${{ secrets.KIS_SECRET_KEY }}
      KIS_CANO: ${{ secrets.KIS_CANO }}
      KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
      KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check Approval & Execute Buy Orders
      run: python .agent/tools/alpha_executor.py
