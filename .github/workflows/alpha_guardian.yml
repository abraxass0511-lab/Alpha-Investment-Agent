name: Alpha Guardian - Portfolio Monitor & Stop-Loss

on:
  # EDT(여름): 장 13:30~20:00 UTC | EST(겨울): 장 14:30~21:00 UTC
  # 양쪽 커버: 13:00~21:50 UTC → 코드에서 장 열렸는지 확인 후 실행
  schedule:
    - cron: '*/10 13-21 * * 1-5'
  workflow_dispatch:

jobs:
  guardian:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    env:
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_SECRET_KEY: ${{ secrets.KIS_SECRET_KEY }}
      KIS_CANO: ${{ secrets.KIS_CANO }}
      KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
      KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}
      WORKER_URL: ${{ secrets.WORKER_URL }}
      WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Guardian Monitor
      run: python .agent/tools/alpha_guardian.py
