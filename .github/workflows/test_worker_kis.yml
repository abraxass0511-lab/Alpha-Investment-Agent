name: Test Worker-KIS Connection

on:
  workflow_dispatch:

jobs:
  test-from-gha:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    env:
      WORKER_URL: ${{ secrets.WORKER_URL }}
      WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}

    steps:
    - name: Test 1 - Worker /debug (잔고 조회)
      run: |
        echo "=== GHA(미국) → Worker → KIS API 테스트 ==="
        echo "목적: 해외 IP에서 Worker 경유로 KIS API가 동작하는지 확인"
        echo ""
        
        RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" "${WORKER_URL}/debug")
        HTTP_CODE=$(echo "$RESPONSE" | tail -1 | sed 's/HTTP_CODE://')
        BODY=$(echo "$RESPONSE" | sed '$d')
        
        echo "HTTP 상태: $HTTP_CODE"
        echo "응답 본문:"
        echo "$BODY" | head -30
        
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ Worker /debug 호출 성공"
        else
          echo "❌ Worker /debug 호출 실패"
        fi

    - name: Test 2 - Worker /api/portfolio (포트폴리오)
      run: |
        echo "=== GHA(미국) → Worker /api/portfolio ==="
        
        RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
          -H "X-API-Key: ${WORKER_API_KEY}" \
          "${WORKER_URL}/api/portfolio")
        HTTP_CODE=$(echo "$RESPONSE" | tail -1 | sed 's/HTTP_CODE://')
        BODY=$(echo "$RESPONSE" | sed '$d')
        
        echo "HTTP 상태: $HTTP_CODE"
        echo "응답 본문:"
        echo "$BODY" | head -30
        
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ /api/portfolio 호출 성공"
        else
          echo "❌ /api/portfolio 호출 실패"
        fi

    - name: Test 3 - Worker Telegram sendMessage (텔레그램)
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "=== GHA(미국) → Telegram API 직접 테스트 ==="
        
        RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
          -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"🧪 GHA 테스트: Worker-KIS 연결 검증 완료\", \"parse_mode\": \"Markdown\"}")
        HTTP_CODE=$(echo "$RESPONSE" | tail -1 | sed 's/HTTP_CODE://')
        BODY=$(echo "$RESPONSE" | sed '$d')
        
        echo "HTTP 상태: $HTTP_CODE"
        
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ 텔레그램 전송 성공"
        else
          echo "❌ 텔레그램 전송 실패"
          echo "$BODY"
        fi

    - name: Test 4 - FMP API 직접 호출
      env:
        FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      run: |
        echo "=== GHA(미국) → FMP API 직접 테스트 ==="
        
        RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
          "https://financialmodelingprep.com/api/v3/quote/AAPL?apikey=${FMP_API_KEY}")
        HTTP_CODE=$(echo "$RESPONSE" | tail -1 | sed 's/HTTP_CODE://')
        BODY=$(echo "$RESPONSE" | sed '$d')
        
        echo "HTTP 상태: $HTTP_CODE"
        echo "AAPL 시세:"
        echo "$BODY" | head -10
        
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ FMP API 호출 성공"
        else
          echo "❌ FMP API 호출 실패"
        fi

    - name: 결과 요약
      if: always()
      run: |
        echo "========================================"
        echo "  GHA → 외부 API 연결 테스트 완료"
        echo "========================================"
        echo ""
        echo "테스트 항목:"
        echo "  1. Worker /debug (KIS 잔고 조회)"
        echo "  2. Worker /api/portfolio (포트폴리오)"
        echo "  3. Telegram sendMessage (알림 발송)"
        echo "  4. FMP API (시세 조회)"
        echo ""
        echo "위 각 단계의 로그를 확인하세요."
