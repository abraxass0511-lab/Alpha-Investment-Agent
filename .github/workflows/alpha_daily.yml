name: Alpha Daily Investment Report

on:
  schedule:
    - cron: '0 21 * * 1-5' # 미국장 마감 후 한국 시간 오전 6시 (21:00 UTC)
  workflow_dispatch: # 수동 실행 가능

jobs:
  run-alpha:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_SECRET_KEY: ${{ secrets.KIS_SECRET_KEY }}
      KIS_CANO: ${{ secrets.KIS_CANO }}
      KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
      KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      WORKER_URL: ${{ secrets.WORKER_URL }}
      WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Alpha Scanner
      id: scanner
      continue-on-error: true
      env:
        PYTHONUNBUFFERED: "1"
      run: |
        timeout 2400 python .agent/tools/alpha_scanner.py || echo "⚠️ 스캐너 에러 또는 타임아웃"

        # metadata.json 성공 여부 확인
        if [ -f "output_reports/metadata.json" ]; then
          SUCCESS=$(python -c "import json; m=json.load(open('output_reports/metadata.json')); print(m.get('success_all', False))" 2>/dev/null || echo "False")
        else
          SUCCESS="False"
        fi
        echo "scan_success=$SUCCESS" >> $GITHUB_OUTPUT

    - name: Run Alpha Sentiment
      if: steps.scanner.outputs.scan_success == 'True'
      continue-on-error: true
      run: python .agent/tools/alpha_sentiment.py

    - name: Run Alpha Rebalancer
      if: steps.scanner.outputs.scan_success == 'True'
      continue-on-error: true
      run: python .agent/tools/alpha_rebalancer.py

    - name: Run Alpha Messenger
      id: messenger
      if: steps.scanner.outputs.scan_success == 'True'
      continue-on-error: true
      run: python .agent/tools/alpha_messenger.py

    - name: Save results to repo
      if: steps.scanner.outputs.scan_success == 'True'
      continue-on-error: true
      run: |
        git config user.name "Alpha Bot"
        git config user.email "alpha-bot@users.noreply.github.com"
        git add output_reports/ -f
        git diff --cached --quiet || git commit -m "📊 scan $(date -u +%Y-%m-%d)"
        git push || (git pull --rebase && git push)

    # 🚨 무조건 실행: 스캔 실패 OR 메신저 실패 → 어떤 상황이든 알림
    - name: Emergency notify on any failure
      if: always() && (steps.scanner.outputs.scan_success != 'True' || steps.messenger.outcome == 'failure')
      run: |
        if [ "${{ steps.messenger.outcome }}" = "failure" ]; then
          echo "메신저 실패 — 보고서 생성됐으나 발송 실패"
        fi
        python .agent/tools/alpha_notify_failure.py || echo "⚠️ 알림 전송 실패"
