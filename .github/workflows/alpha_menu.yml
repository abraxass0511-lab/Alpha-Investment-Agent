name: Alpha Telegram Menu Bot (DISABLED - Using Cloudflare Worker Webhook)

# ⚡ 텔레그램 메시지 처리는 Cloudflare Worker Webhook이 실시간으로 담당
# 이 워크플로우는 비활성화됨 (getUpdates 폴링 → Worker Webhook으로 전환)
# Worker와 getUpdates가 동시에 돌면 충돌하므로, 반드시 하나만 사용

on:
  workflow_dispatch:  # 수동 테스트용으로만 유지

jobs:
  disabled-notice:
    runs-on: ubuntu-latest
    steps:
    - name: Notice
      run: |
        echo "⚡ 텔레그램 메뉴는 Cloudflare Worker Webhook이 실시간으로 처리합니다."
        echo "📡 Worker URL에 Telegram Webhook이 등록되어 있습니다."
        echo "🚫 이 워크플로우의 getUpdates 폴링은 비활성화되었습니다."
