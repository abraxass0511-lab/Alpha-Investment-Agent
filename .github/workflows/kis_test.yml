name: KIS API Connection Test

on:
  workflow_dispatch: # 수동 실행 전용

jobs:
  test-kis:
    runs-on: ubuntu-latest
    
    env:
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_SECRET_KEY: ${{ secrets.KIS_SECRET_KEY }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test KIS Connection
      run: python test_kis_balance.py
